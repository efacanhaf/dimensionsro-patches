<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>DimensionsRO Launcher</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 780px; height: 580px; overflow: hidden;
    font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
    color: #ece4f8;
    background: #07050b;
    user-select: none;
    position: relative;
  }

  /* HERO IMAGE — fills upper portion only, NOT entire viewport */
  .hero {
    position:absolute; top:0; left:0; right:0; height:430px;
    background: url('banner.png?v=2') center/cover no-repeat #07050b;
  }
  .hero::after {
    content:''; position:absolute; left:0; right:0; bottom:0; height:120px;
    background:linear-gradient(180deg, transparent 0%, rgba(7,5,11,0.95) 100%);
  }

  /* TOP STATUS PILL (overlay on hero) */
  .top-bar {
    position:absolute; top:14px; right:18px; z-index:10;
    display:flex; align-items:center;
    background:rgba(7,5,11,0.85);
    border:1px solid rgba(176,38,255,0.45);
    padding:7px 16px;
    box-shadow:0 4px 14px rgba(0,0,0,0.6);
  }
  .dot { width:10px; height:10px; border-radius:50%; background:#7eebd0; box-shadow:0 0 14px #7eebd0; margin-right:10px; animation:pulse 1.6s infinite; }
  @keyframes pulse { 50% { box-shadow:0 0 24px #7eebd0; } }
  .top-bar span { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:#fff; font-weight:700; }

  /* NEWS / BOTTOM PANEL — fixed bottom, generous play button room */
  .lower {
    position:absolute; left:0; right:0; bottom:0; height:150px;
    background:#0c0816;
    border-top:1px solid rgba(176,38,255,0.5);
    display:flex;
  }
  .news-col {
    flex:1; padding:14px 20px;
    border-right:1px solid rgba(176,38,255,0.18);
    overflow:hidden;
  }
  .news-col h2 {
    font-size:11px; letter-spacing:4px; color:#c987ff; font-weight:800;
    text-transform:uppercase; margin-bottom:8px;
  }
  .news-row { display:flex; gap:12px; }
  .news-card {
    flex:1; padding:4px 8px; border-left:3px solid #b026ff;
  }
  .news-card .meta { font-size:10px; color:#8a7ab0; letter-spacing:1.5px; text-transform:uppercase; }
  .news-card .h { font-size:13px; color:#fff; font-weight:700; margin:2px 0; }
  .news-card .t { font-size:11px; color:#b8a9d0; line-height:1.3; }

  .action-col {
    width:240px;
    padding:14px 18px;
    display:flex; flex-direction:column; justify-content:space-between;
    align-items:stretch;
    background:linear-gradient(180deg, rgba(176,38,255,0.10) 0%, rgba(7,5,11,0) 100%);
  }
  .progress { color:#a99cc4; }
  .progress .lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; display:flex; justify-content:space-between; }
  .progress .lbl .pct { color:#7eebd0; font-weight:700; }
  .bar { height:5px; background:rgba(176,38,255,0.2); border-radius:3px; overflow:hidden; }
  .bar > div { height:100%; width:0%; background:linear-gradient(90deg,#b026ff,#7eebd0); box-shadow:0 0 10px #b026ff; transition:width 0.4s; }

  .btns { display:flex; gap:10px; align-items:stretch; }
  button { font-family:inherit; cursor:pointer; text-transform:uppercase; font-weight:800; }
  .btn-secondary {
    width:46px; height:50px; font-size:20px; padding:0;
    background:rgba(176,38,255,0.1);
    border:1px solid rgba(176,38,255,0.5);
    color:#ece4f8;
    transition:all 0.2s;
  }
  .btn-secondary:hover { background:rgba(176,38,255,0.25); color:#fff; }
  .btn-play {
    flex:1; height:50px;
    font-size:18px; letter-spacing:6px;
    background:linear-gradient(135deg, #b026ff 0%, #6a13a8 100%);
    border:1px solid #d558ff;
    color:#fff;
    box-shadow:
      0 0 24px rgba(176,38,255,0.6),
      inset 0 1px 0 rgba(255,210,255,0.4);
    transition:all 0.2s;
  }
  .btn-play:hover {
    background:linear-gradient(135deg, #d558ff 0%, #8b1edb 100%);
    box-shadow:0 0 36px rgba(213,88,255,0.85);
  }
  .btn-play:active { transform:translateY(1px); }
</style>
</head>
<body>
<div class="hero"></div>

<div class="top-bar">
  <div class="dot"></div>
  <span id="server-status">ONLINE</span>
</div>

<div class="lower">
  <div class="news-col">
    <h2>◆ Latest Transmissions</h2>
    <div class="news-row">
      <div class="news-card">
        <div class="meta">2026.04.25 · OPEN</div>
        <div class="h">Server is Live</div>
        <div class="t">The rifts have opened. Renewal · 4th class.</div>
      </div>
      <div class="news-card">
        <div class="meta">2026.04.25 · v1.0</div>
        <div class="h">Translation Layer</div>
        <div class="t">Items, skills, UI in English.</div>
      </div>
    </div>
  </div>
  <div class="action-col">
    <div class="progress">
      <div class="lbl"><span id="progress-label">IDLE</span><span class="pct" id="progress-pct"></span></div>
      <div class="bar"><div id="progress-bar"></div></div>
    </div>
    <div class="btns">
      <button class="btn-secondary" title="Setup" onclick="doSetup()">⚙</button>
      <button class="btn-play" onclick="doPlay()">PLAY</button>
    </div>
  </div>
</div>

<script>
  function invoke(a) {
    if (window.external && typeof window.external.invoke === 'function') {
      try { window.external.invoke(a); } catch(e) {}
    }
  }
  function doPlay() { invoke('play'); }
  function doSetup() { invoke('setup'); }

  setTimeout(function () { invoke('start_update'); }, 200);

  if (window.addEventListener) {
    window.addEventListener('message', function (e) {
      try {
        var d = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!d) return;
        var lbl = document.getElementById('progress-label');
        var bar = document.getElementById('progress-bar');
        var pe = document.getElementById('progress-pct');
        if (d.type === 'patching_status' && lbl) lbl.innerHTML = ((d.label || '') + '').toUpperCase() || 'PATCHING';
        if (d.type === 'patching_progress' && typeof d.value === 'number') {
          var pct = Math.round(d.value * 100);
          if (bar) bar.style.width = pct + '%';
          if (pe) pe.innerHTML = pct + '%';
        }
        if (d.type === 'patching_complete') {
          if (lbl) lbl.innerHTML = 'READY';
          if (bar) bar.style.width = '100%';
          if (pe) pe.innerHTML = '';
        }
      } catch(_) {}
    });
  }
</script>
</body>
</html>
