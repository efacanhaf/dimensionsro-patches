<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>DimensionsRO Launcher</title>
<style>
  *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 780px; height: 580px; overflow: hidden;
    font-family: 'Segoe UI', 'Trebuchet MS', sans-serif;
    color: #ece4f8;
    background: #07050b;
    user-select: none;
  }

  /* HERO IMAGE — fills whole viewport */
  .hero {
    position:absolute; inset:0;
    background: url('banner.png?v=1') center/cover no-repeat #07050b;
  }
  /* Bottom darkening for text/buttons readability */
  .hero::after {
    content:''; position:absolute; left:0; right:0; bottom:0; height:200px;
    background:linear-gradient(180deg, transparent 0%, rgba(7,5,11,0.85) 60%, #07050b 100%);
  }

  /* TOP STATUS PILL */
  .top-bar {
    position:absolute; top:14px; right:18px; z-index:10;
    display:flex; align-items:center;
    background:rgba(7,5,11,0.85);
    border:1px solid rgba(176,38,255,0.45);
    padding:7px 16px;
    box-shadow:0 4px 14px rgba(0,0,0,0.6);
  }
  .dot { width:10px; height:10px; border-radius:50%; background:#7eebd0; box-shadow:0 0 14px #7eebd0; margin-right:10px; animation:pulse 1.6s infinite; }
  @keyframes pulse { 50% { box-shadow:0 0 24px #7eebd0; } }
  .top-bar span { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:#fff; font-weight:700; }

  /* NEWS PANEL — overlay above bottom bar */
  .panel-news {
    position:absolute; left:18px; right:18px; bottom:90px;
    background:rgba(15,10,24,0.86);
    border:1px solid rgba(176,38,255,0.45);
    padding:10px 16px;
    box-shadow:0 6px 20px rgba(0,0,0,0.7), 0 0 30px rgba(176,38,255,0.08) inset;
    height:120px; overflow:hidden;
  }
  .panel-news h2 {
    font-size:11px; letter-spacing:4px; color:#c987ff; font-weight:800;
    text-transform:uppercase; margin-bottom:8px;
    padding-bottom:5px;
    border-bottom:1px solid rgba(201,135,255,0.28);
  }
  .news-row { display:flex; gap:14px; }
  .news-card {
    flex:1; padding:4px 10px;
    border-left:3px solid #b026ff;
  }
  .news-card .meta { font-size:10px; color:#8a7ab0; letter-spacing:1.6px; text-transform:uppercase; }
  .news-card .h { font-size:14px; color:#fff; font-weight:700; margin:3px 0; }
  .news-card .t { font-size:12px; color:#c8b8e0; line-height:1.35; }

  /* BOTTOM ACTION BAR */
  .actions {
    position:absolute; bottom:0; left:0; right:0; height:80px;
    background:linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.6) 50%, #050308 100%);
    border-top:1px solid rgba(176,38,255,0.4);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px;
    z-index:5;
  }
  .progress {
    flex:1; max-width:340px; margin-right:18px;
    color:#a99cc4;
  }
  .progress .lbl { font-size:11px; letter-spacing:2.5px; text-transform:uppercase; margin-bottom:6px; display:flex; justify-content:space-between; }
  .progress .lbl .pct { color:#7eebd0; font-weight:700; }
  .bar { height:6px; background:rgba(176,38,255,0.2); border-radius:3px; overflow:hidden; box-shadow:0 0 10px rgba(176,38,255,0.3) inset; }
  .bar > div { height:100%; width:0%; background:linear-gradient(90deg,#b026ff,#7eebd0,#ff6da8); box-shadow:0 0 14px #b026ff; transition:width 0.4s; }

  .btns { display:flex; align-items:center; gap:12px; }
  button { font-family:inherit; cursor:pointer; text-transform:uppercase; font-weight:800; }
  .btn-secondary {
    width:50px; height:50px; font-size:22px; padding:0;
    background:rgba(176,38,255,0.10);
    border:1px solid rgba(176,38,255,0.5);
    color:#ece4f8;
    transition:all 0.2s;
  }
  .btn-secondary:hover { background:rgba(176,38,255,0.25); color:#fff; box-shadow:0 0 18px rgba(176,38,255,0.5); }
  .btn-play {
    height:56px; min-width:200px;
    padding:0 44px;
    font-size:22px; letter-spacing:10px;
    background:linear-gradient(135deg, #b026ff 0%, #6a13a8 100%);
    border:1px solid #d558ff;
    color:#fff;
    box-shadow:
      0 0 32px rgba(176,38,255,0.6),
      0 4px 14px rgba(0,0,0,0.7),
      inset 0 1px 0 rgba(255,210,255,0.4);
    transition:all 0.2s;
  }
  .btn-play:hover {
    background:linear-gradient(135deg, #d558ff 0%, #8b1edb 100%);
    box-shadow:
      0 0 44px rgba(213,88,255,0.85),
      0 6px 18px rgba(0,0,0,0.8);
  }
  .btn-play:active { transform:translateY(2px); }
</style>
</head>
<body>
<div class="hero"></div>

<div class="top-bar">
  <div class="dot"></div>
  <span id="server-status">ONLINE</span>
</div>

<div class="panel-news">
  <h2>◆ Latest Transmissions</h2>
  <div class="news-row">
    <div class="news-card">
      <div class="meta">2026.04.25 · OPEN</div>
      <div class="h">Server is Live</div>
      <div class="t">The rifts have opened. Renewal · 4th class · Welcome, traveler.</div>
    </div>
    <div class="news-card">
      <div class="meta">2026.04.25 · v1.0</div>
      <div class="h">Translation Layer</div>
      <div class="t">Items, skills, UI in English. Report anomalies via the void.</div>
    </div>
  </div>
</div>

<div class="actions">
  <div class="progress">
    <div class="lbl"><span id="progress-label">IDLE</span><span class="pct" id="progress-pct"></span></div>
    <div class="bar"><div id="progress-bar"></div></div>
  </div>
  <div class="btns">
    <button class="btn-secondary" title="Setup" onclick="doSetup()">⚙</button>
    <button class="btn-play" onclick="doPlay()">PLAY</button>
  </div>
</div>

<script>
  function invoke(a) {
    if (window.external && typeof window.external.invoke === 'function') {
      try { window.external.invoke(a); } catch(e) {}
    }
  }
  function doPlay() { invoke('play'); }
  function doSetup() { invoke('setup'); }

  setTimeout(function () { invoke('start_update'); }, 200);

  if (window.addEventListener) {
    window.addEventListener('message', function (e) {
      try {
        var d = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
        if (!d) return;
        var lbl = document.getElementById('progress-label');
        var bar = document.getElementById('progress-bar');
        var pe = document.getElementById('progress-pct');
        if (d.type === 'patching_status' && lbl) lbl.innerHTML = ((d.label || '') + '').toUpperCase() || 'PATCHING';
        if (d.type === 'patching_progress' && typeof d.value === 'number') {
          var pct = Math.round(d.value * 100);
          if (bar) bar.style.width = pct + '%';
          if (pe) pe.innerHTML = pct + '%';
        }
        if (d.type === 'patching_complete') {
          if (lbl) lbl.innerHTML = 'READY';
          if (bar) bar.style.width = '100%';
          if (pe) pe.innerHTML = '';
        }
      } catch(_) {}
    });
  }
</script>
</body>
</html>
